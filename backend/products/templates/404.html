{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="error-page-wrapper text-center">
    <img src="{% static 'images/khorgosh.png' %}" alt="Khorgosh" class="error-mascot">
    <h1 class="error-code">404</h1>
    <h3 class="error-title">Oops, this page hopped away!</h3>
    <p class="error-message">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <a href="{% url 'home' %}" class="error-home-btn">← Back to Homepage</a>
</div>

<style>
    .error-page-wrapper {
        min-height: 60vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .error-mascot {
        width: 140px;
        height: 140px;
        object-fit: contain;
        border-radius: 50%;
        opacity: 0.9;
        box-shadow: 0 10px 30px rgba(26, 35, 126, 0.15);
        margin-bottom: 24px;
        animation: errorFloat 3s ease-in-out infinite;
    }

    @keyframes errorFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    .error-code {
        font-size: 90px;
        font-weight: 900;
        color: var(--primary-color);
        margin-bottom: 0;
        letter-spacing: 4px;
    }

    .error-title {
        font-weight: 700;
        color: #333;
        margin-bottom: 12px;
    }

    .error-message {
        color: #555;
        font-size: 15px;
        max-width: 420px;
        margin-bottom: 28px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.75);
        padding: 8px 16px;
        border-radius: 10px;
    }

    .error-home-btn {
        background: linear-gradient(90deg, #ff6f00, #ff8f00);
        color: white;
        font-weight: 700;
        border-radius: 10px;
        padding: 12px 32px;
        text-decoration: none;
        font-size: 15px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .error-home-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(255, 111, 0, 0.35);
        color: white;
    }
</style>

{% endblock %}
